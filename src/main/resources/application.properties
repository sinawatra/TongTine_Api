spring.application.name=demo


# PostgreSQL Configuration Properties
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tongtin}
spring.datasource.username=${DATABASE_USERNAME:user}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernates Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# This tells Spring Boot to use the port assigned by Render
server.port=${PORT:8080}